<main id="page-content" class="d-flex justify-content-center align-items-center">
    <div class="container-fluid contenedor-grip"><!--style="padding-top: 2%;"-->
            <!-- INICIO IMAGEN-->
            <div class="d-flex flex-column justify-content-center align-items-center"><!--style="padding-top: 18%;"-->
                <img src="../../assets/img/engineering_team.svg" class="img-fluid" alt="" width="500px" height="500px">
                <h1 style="color: white;">¡Unete a Tigershare Hoy!</h1>
            </div><!-- FIN IMAGEN-->

            <!-- INICIO Formulario-->
            <div class="d-flex justify-content-center align-items-center" style="padding-bottom: 30%;"><!--style="padding-bottom: 30%;"-->
                <form action="" class="formulario h-auto">
                    <div class="d-xxl-flex d-xl-flex d-lg-flex d-md-block d-sm-block d-block">
                        <div class="mb-3 p-1">
                            <label for="nameInput" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nameInput" placeholder="Ingrese su nombre" required>
                        </div>
                        <div class="mb-3 p-1">
                            <label for="lastnameInput" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="lastnameInput" placeholder="Ingrese su apellido" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="emailInput" class="form-label">Correo electronico</label>
                        <input type="email" class="form-control" id="emailInput" placeholder="desarrollador@gmail.com">
                    </div>
                    <div class="mb-3">
                        <label for="passwordInput" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="passwordInput" placeholder="************"
                            required>
                    </div>
                    <div class="d-xxl-flex d-xl-flex d-lg-flex d-md-flex d-sm-block d-block">
                        <div class="mb-3 p-1">
                            <label for="dateInput" class="form-label">Fecha de nacimiento</label>
                            <input type="date" class="form-control" id="dateInput" required>
                        </div>
                        <div class="mb-3 p-1 col">
                            <label for="planInput" class="form-label">Plan</label>
                            <select class="form-select" id="planInput" aria-label="Default select example">
                                <option selected disabled>Plan</option>
                                <option value="Rookie">Rookie</option>
                                <option value="Elite">Elite</option>
                                <option value="Ally">Ally</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                            <label class="form-check-label" for="flexCheckDefault">Acepto terminos y condiciones</label>
                        </div>
                        <div class="mb-3">
                            <button type="" class="btn btn-login">Registrarse</button>
                        </div>
                    </div>
                    <div class="mb-3 d-flex justify-content-center align-items-center">
                        <a href="" class="btn btn-ref">
                            <i class="fa-brands fa-facebook"></i> Ingresar con Facebook
                        </a>
                    </div>
                </form>
            </div><!-- FIN Formulario-->

    </div>
</main>
